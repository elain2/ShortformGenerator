<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <title>Shorts Video Composition</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HyperFrames 루트 컴포지션 -->
    <div id="composition-root"
         data-composition-id="shorts-main"
         data-width="1080"
         data-height="1920"
         data-fps="30"
         data-duration="23.500"
         data-start="0">

        <!-- 비디오 레이어 (다중 클립) -->
        <div id="video-layer" class="layer">
        <video id="clip-0"
               class="clip"
               src="assets/highlights/4기압다이버의 순간_clip_001.mp4"
               data-component="video"
               data-start="0.000"
               muted playsinline preload="auto">
        </video>
        <video id="clip-1"
               class="clip"
               src="assets/highlights/DJI_20260425114855_0920_D_clip_001.mp4"
               data-component="video"
               data-start="4.900"
               muted playsinline preload="auto">
        </video>
        <video id="clip-2"
               class="clip"
               src="assets/highlights/DJI_20260425114855_0920_D_clip_002.mp4"
               data-component="video"
               data-start="8.333"
               muted playsinline preload="auto">
        </video>
        <video id="clip-3"
               class="clip"
               src="assets/highlights/DJI_20260425114855_0920_D_clip_003.mp4"
               data-component="video"
               data-start="13.233"
               muted playsinline preload="auto">
        </video>
        <video id="clip-4"
               class="clip"
               src="assets/highlights/DJI_20260425125024_0930_D_clip_001.mp4"
               data-component="video"
               data-start="19.100"
               muted playsinline preload="auto">
        </video>
        </div>

        <!-- 자막 레이어 -->
        <div id="subtitle-layer" class="layer">
            <div id="subtitle-container">
                <p id="subtitle-text"></p>
            </div>
        </div>

        <!-- BGM -->
        <audio id="bgm"
               src="assets/bgm.mp3"
               data-component="audio"
               data-start="0"
               data-volume="0.3"
               loop
               preload="auto">
        </audio>
    </div>

    <!-- 자막 데이터 -->
    <script type="application/json" id="subtitles-data">
[
  {
    "id": 1,
    "text": "오늘은 정말 좋은 날이에요.",
    "start_time": 0.0,
    "end_time": 3.143,
    "duration": 3.143,
    "syllable_count": 11
  },
  {
    "id": 2,
    "text": "여행을 떠나볼까요?",

    "duration": 2.286,
    "syllable_count": 8
  },
  {
    "id": 3,
    "text": "함께 아름다운 풍경을 감상해봐요.",
    "start_time": 5.629,
    "end_time": 9.629,
    "duration": 4.0,
    "syllable_count": 14
  },
  {
    "id": 4,
    "text": "이곳의 분위기가 너무 좋아요.",
    "start_time": 9.729,
    "end_time": 13.157,
    "duration": 3.429,

  },

    <!-- 스크립트 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="animation.js"></script>
</body>
</html>
